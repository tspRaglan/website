<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raglan.au</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background-color: black;
        }

        /* --- LOGO STYLING --- */
        #logo-container {
            width: 1000px;
            /* Even bigger as requested */
            height: 1000px;
            max-width: 90vw;
            /* Responsive scaling for smaller screens */
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            /* allows the glow to spread out */
        }

        #raglan-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;

            /* CROP: Hide the bottom part where the text is */
            clip-path: inset(0 0 12% 0);

            /*
               COLOR MAGIC:
               1. sepia(1) turns white/gray into a yellowish base.
               2. saturate(10) makes it intense.
               3. hue-rotate(Xdeg) then cycles through the whole rainbow.
            */
            animation: pulse 4s infinite ease-in-out, glowCycle 8s infinite linear;
        }

        #logo-container:hover {
            transform: scale(1.05);
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1.0);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes glowCycle {
            0% {
                filter: sepia(1) saturate(20) hue-rotate(0deg) drop-shadow(0 0 15px currentColor);
                color: #00f2ff;
            }

            33% {
                filter: sepia(1) saturate(20) hue-rotate(90deg) drop-shadow(0 0 20px currentColor);
                color: #7000ff;
            }

            66% {
                filter: sepia(1) saturate(20) hue-rotate(240deg) drop-shadow(0 0 25px currentColor);
                color: #ff00c8;
            }

            100% {
                filter: sepia(1) saturate(20) hue-rotate(360deg) drop-shadow(0 0 15px currentColor);
                color: #00f2ff;
            }
        }

        /* --- IFRAME SHELL --- */
        #main-shell {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <div id="logo-container" onclick="startExperience()">
            <img src="Raglan Logo.png" id="raglan-logo" alt="raglan logo">
        </div>
    </div>

    <iframe id="main-shell" src="tsp/sdp/index.html" allow="autoplay; fullscreen"></iframe>

    <script>
        // Clear session on page load so a browser refresh always acts as a "Reset to Home"
        sessionStorage.removeItem('tsp_started');

        function startExperience() {
            sessionStorage.setItem('tsp_started', 'true');
            showExperience();

            // Tell the iframe to start playback since the user just clicked
            const iframe = document.getElementById('main-shell');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'tsp_start_playback' }, '*');
            }
        }

        function showExperience() {
            document.getElementById('start-screen').style.display = 'none';
        }

        // Listen for internal "autoplay success" from subprojects
        window.addEventListener('message', (event) => {
            if (event.data.type === 'tsp_autoplay_success') {
                console.log("Subproject successfully autoplays. Bypassing root overlay.");
                showExperience();
            }
        });

        // Always show the shell container but use the start-screen as a literal overlay
        document.getElementById('main-shell').style.display = 'block';
    </script>
</body>

</html>
