<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tsp - start</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background-color: black;
        }

        /* --- LOGO STYLING --- */
        #logo-container {
            width: 800px;
            /* Twice as big as previous 400px */
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
            /* Provides "crop" to the container edges */
        }

        #raglan-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* This "crops" the JPG square to the container */
            mix-blend-mode: screen;
            /* Convert green to white: grayscale makes it gray, brightness(20) pushes it to pure white */
            filter: grayscale(1) brightness(20);
            animation: pulse 4s infinite ease-in-out, glowCycle 6s infinite linear;
        }

        #logo-container:hover {
            transform: scale(1.02);
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1.0);
            }

            50% {
                transform: scale(1.03);
                /* Subtle pulse for large size */
            }
        }

        @keyframes glowCycle {
            0% {
                filter: brightness(1.2) drop-shadow(0 0 15px #00f2ff);
            }

            33% {
                filter: brightness(1.2) drop-shadow(0 0 20px #7000ff);
            }

            66% {
                filter: brightness(1.2) drop-shadow(0 0 25px #ff00c8);
            }

            100% {
                filter: brightness(1.2) drop-shadow(0 0 15px #00f2ff);
            }
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <div id="logo-container" onclick="startExperience()">
            <img src="Raglan Logo.jpg" id="raglan-logo" alt="raglan logo">
        </div>
    </div>

    <iframe id="main-shell" src="./tsp/sdp/index.html"></iframe>

    <script>
        function startExperience() {
            sessionStorage.setItem('tsp_started', 'true');
            showExperience();
        }

        function showExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-shell').style.display = 'block';
        }

        // if already started, show immediately
        if (sessionStorage.getItem('tsp_started') === 'true') {
            showExperience();
        }

        // Listen for internal "autoplay success" from subprojects
        window.addEventListener('message', (event) => {
            if (event.data.type === 'tsp_autoplay_success') {
                console.log("Subproject successfully autoplays. Bypassing root overlay.");
                showExperience();
            }
        });

        // Always show the shell container but use the start-screen as a literal overlay
        document.getElementById('main-shell').style.display = 'block';
    </script>
</body>

</html>
