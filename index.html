<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raglan.au</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background-color: black;
        }

        /* --- LOGO STYLING --- */
        #logo-container {
            width: 1000px;
            /* Even bigger as requested */
            height: 1000px;
            max-width: 90vw;
            /* Responsive scaling for smaller screens */
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            /* allows the glow to spread out */
        }

        #raglan-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;

            /* CROP: Hide the bottom part where the text is */
            clip-path: inset(0 0 12% 0);

            /*
               COLOR MAGIC:
               1. sepia(1) turns white/gray into a yellowish base.
               2. saturate(10) makes it intense.
               3. hue-rotate(Xdeg) then cycles through the whole rainbow.
            */
            animation: pulse 4s infinite ease-in-out, glowCycle 8s infinite linear;
        }

        #logo-container:hover {
            transform: scale(1.05);
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1.0);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes glowCycle {
            0% {
                filter: sepia(1) saturate(20) hue-rotate(0deg) drop-shadow(0 0 15px currentColor);
                color: #00f2ff;
            }

            33% {
                filter: sepia(1) saturate(20) hue-rotate(90deg) drop-shadow(0 0 20px currentColor);
                color: #7000ff;
            }

            66% {
                filter: sepia(1) saturate(20) hue-rotate(240deg) drop-shadow(0 0 25px currentColor);
                color: #ff00c8;
            }

            100% {
                filter: sepia(1) saturate(20) hue-rotate(360deg) drop-shadow(0 0 15px currentColor);
                color: #00f2ff;
            }
        }

        /* --- IFRAME SHELL --- */
        #main-shell {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 10;
        }

        /* --- GLOBAL PLAYER UI (on Root Shell) --- */
        #player-shell-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            /* Above everything */
            display: none;
            /* Hidden until start */
            text-align: center;
            min-width: 280px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
            pointer-events: auto;
        }

        #track-title {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: normal;
            display: block;
            text-shadow: 1px 1px 2px black;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
            margin: 0 auto 12px auto;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .ctrl-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 44px;
            height: 44px;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .ctrl-btn.active-random {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            border-color: black;
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            -webkit-appearance: none;
            margin-top: -5px;
        }

        @media (max-width: 600px) {
            #player-shell-container {
                bottom: 25px;
                width: calc(100% - 40px);
                max-width: 340px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <div id="logo-container" onclick="startExperience()">
            <img src="Raglan Logo.png" id="raglan-logo" alt="raglan logo">
        </div>
    </div>

    <iframe id="main-shell" src="tsp/sdp/index.html" allow="autoplay; fullscreen"></iframe>

    <div id="player-shell-container">
        <span id="track-title">loading...</span>
        <div class="controls-row">
            <button class="ctrl-btn" onclick="sendCommand('prev')">&#9664;</button>
            <button class="ctrl-btn" id="play-pause-btn" onclick="sendCommand('toggle_play')">&#10074;&#10074;</button>
            <button class="ctrl-btn" onclick="sendCommand('next')">&#9654;</button>
            <button class="ctrl-btn" id="random-btn" onclick="sendCommand('toggle_random')">⤨</button>
        </div>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5"
                oninput="sendCommand('set_volume', this.value)">
        </div>
    </div>

    <script>
        const iframe = document.getElementById('main-shell');
        const playerUI = document.getElementById('player-shell-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const randomBtn = document.getElementById('random-btn');
        const trackTitle = document.getElementById('track-title');

        // Clear session on page load so a browser refresh always acts as a "Reset to Home"
        sessionStorage.removeItem('tsp_started');

        function sendCommand(type, value = null) {
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'tsp_command', command: type, value: value }, '*');
            }
        }

        function startExperience() {
            sessionStorage.setItem('tsp_started', 'true');
            showExperience();
            sendCommand('start');
        }

        function showExperience() {
            document.getElementById('start-screen').style.display = 'none';
            playerUI.style.display = 'block';
        }

        // Listen for updates from subprojects
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'tsp_autoplay_success') {
                showExperience();
            }
            if (data.type === 'tsp_track_update') {
                trackTitle.innerText = data.title;
            }
            if (data.type === 'tsp_state_update') {
                playPauseBtn.innerHTML = data.isPlaying ? '&#10074;&#10074;' : '&#9654;';
                if (data.isRandom) {
                    randomBtn.classList.add('active-random');
                } else {
                    randomBtn.classList.remove('active-random');
                }
            }
        });

        // Always show the shell container but use the start-screen as a literal overlay
        document.getElementById('main-shell').style.display = 'block';
    </script>
</body>

</html>
