<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tsp - start</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background-color: black;
        }

        /* --- LOGO STYLING --- */
        #logo-container {
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            overflow: visible;
            /* allows the glow to spread out */
        }

        #raglan-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;

            /* CROP: Hide the bottom ~15% of the image where the writing is */
            clip-path: inset(0 0 12% 0);

            /* Enhanced filter: High brightness makes it white, hue-rotate cycles the shadow color */
            animation: pulse 4s infinite ease-in-out, glowCycle 6s infinite linear;
        }

        #logo-container:hover {
            transform: scale(1.05);
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1.0);
                filter: brightness(1.5);
            }

            50% {
                transform: scale(1.1);
                filter: brightness(2);
            }
        }

        @keyframes glowCycle {
            0% {
                filter: grayscale(1) brightness(10) drop-shadow(0 0 15px #00f2ff) drop-shadow(0 0 30px #00f2ff) hue-rotate(0deg);
            }

            33% {
                filter: grayscale(1) brightness(10) drop-shadow(0 0 15px #7000ff) drop-shadow(0 0 30px #7000ff) hue-rotate(120deg);
            }

            66% {
                filter: grayscale(1) brightness(10) drop-shadow(0 0 15px #ff00c8) drop-shadow(0 0 30px #ff00c8) hue-rotate(240deg);
            }

            100% {
                filter: grayscale(1) brightness(10) drop-shadow(0 0 15px #00f2ff) drop-shadow(0 0 30px #00f2ff) hue-rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <div id="logo-container" onclick="startExperience()">
            <img src="Raglan Logo.jpg" id="raglan-logo" alt="raglan logo">
        </div>
    </div>

    <iframe id="main-shell" src="./tsp/sdp/index.html"></iframe>

    <script>
        function startExperience() {
            sessionStorage.setItem('tsp_started', 'true');
            showExperience();
        }

        function showExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-shell').style.display = 'block';
        }

        // if already started, show immediately
        if (sessionStorage.getItem('tsp_started') === 'true') {
            showExperience();
        }

        // Listen for internal "autoplay success" from subprojects
        window.addEventListener('message', (event) => {
            if (event.data.type === 'tsp_autoplay_success') {
                console.log("Subproject successfully autoplays. Bypassing root overlay.");
                showExperience();
            }
        });

        // Always show the shell container but use the start-screen as a literal overlay
        document.getElementById('main-shell').style.display = 'block';
    </script>
</body>

</html>
