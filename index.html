<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tsp - start</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background-color: black;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 2rem;
            background: transparent;
            color: white;
            border: 4px solid white;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.2s ease-in-out;
        }

        #start-btn:hover {
            background-color: white;
            color: black;
            transform: scale(1.05);
        }

        #main-shell {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <button id="start-btn" onclick="startExperience()">click to start</button>
    </div>

    <iframe id="main-shell" src="./tsp/sdp/index.html"></iframe>

    <script>
        function startExperience() {
            sessionStorage.setItem('tsp_started', 'true');
            showExperience();
        }

        function showExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-shell').style.display = 'block';
        }

        // if already started, show immediately
        if (sessionStorage.getItem('tsp_started') === 'true') {
            showExperience();
        }

        // Listen for internal "autoplay success" from subprojects
        window.addEventListener('message', (event) => {
            if (event.data.type === 'tsp_autoplay_success') {
                console.log("Subproject successfully autoplays. Bypassing root overlay.");
                showExperience();
            }
        });

        // Always show the shell container but use the start-screen as a literal overlay
        document.getElementById('main-shell').style.display = 'block';
    </script>
</body>

</html>
