<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raglan.au</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }


        /* --- IFRAME SHELL --- */
        #main-shell {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
            overflow: hidden;
        }

        /* --- GLOBAL PLAYER UI (on Root Shell) --- */
        #player-shell-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: none;
            text-align: center;
            width: 240px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
            pointer-events: auto;
        }

        #track-title {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: normal;
            display: block;
            text-shadow: 1px 1px 2px black;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            margin: 0 auto 10px auto;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .ctrl-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 44px;
            height: 44px;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .ctrl-btn.active-random {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            border-color: black;
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 600px) {
            #player-shell-container {
                bottom: 12px;
                left: 12px;
                width: 200px;
                padding: 10px 12px;
            }

            .ctrl-btn {
                min-width: 64px;
                height: 64px;
                font-size: 1.6rem;
                border-radius: 10px;
            }

            .controls-row {
                gap: 12px;
                margin-bottom: 12px;
            }

            #track-title {
                font-size: 1rem;
                margin-bottom: 10px;
            }

            input[type=range]::-webkit-slider-thumb {
                height: 24px;
                width: 24px;
                margin-top: -9px;
            }
        }
    </style>
</head>

<body>
    <!-- start screen is handled inside the active subproject iframe -->

    <iframe id="main-shell" src="tsp/katherine/index.html" allow="autoplay; fullscreen"></iframe>

    <div id="player-shell-container">
        <span id="track-title">loading...</span>
        <div class="controls-row">
            <button class="ctrl-btn" onclick="sendCommand('prev')" title="previous">&#9198;</button>
            <button class="ctrl-btn" id="play-pause-btn" onclick="sendCommand('toggle_play')" title="play/pause">&#9654;</button>
            <button class="ctrl-btn" onclick="sendCommand('next')" title="next">&#9197;</button>
            <button class="ctrl-btn" id="random-btn" onclick="sendCommand('toggle_random')" title="shuffle">&#10227;</button>
        </div>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5"
                oninput="sendCommand('set_volume', this.value)">
        </div>
    </div>

    <script>
        const iframe = document.getElementById('main-shell');
        const playerUI = document.getElementById('player-shell-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const randomBtn = document.getElementById('random-btn');
        const trackTitle = document.getElementById('track-title');

        // Clear session on page load so a browser refresh always acts as a "Reset to Home"
        sessionStorage.removeItem('tsp_started');

        function sendCommand(type, value = null) {
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'tsp_command', command: type, value: value }, '*');
            }
        }


        function showExperience() {
            playerUI.style.display = 'block';
        }

        // Listen for updates from subprojects
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'tsp_autoplay_success') {
                showExperience();
            }
            if (data.type === 'tsp_track_update') {
                trackTitle.innerText = data.title;
            }
            if (data.type === 'tsp_state_update') {
                playPauseBtn.innerHTML = data.isPlaying ? '&#9646;&#9646;' : '&#9654;';
                if (data.isRandom) {
                    randomBtn.classList.add('active-random');
                } else {
                    randomBtn.classList.remove('active-random');
                }
            }
        });

        document.getElementById('main-shell').style.display = 'block';
    </script>
</body>

</html>
