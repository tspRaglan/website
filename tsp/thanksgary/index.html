<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thanks gary!</title>

    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        /* --- RESET & BASICS --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- BACKGROUND VIDEO --- */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 2rem;
            background: transparent;
            color: white;
            border: 4px solid white;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

            #start-btn:hover {
                background-color: white;
                color: black;
            }

        /* --- PLAYER CONTROLS --- */
        #player-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            display: none; /* Hidden until start */

            text-align: center;
            min-width: 240px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        #track-title {
            color: white;
            font-size: 1rem;
            margin-bottom: 12px;
            text-transform: lowercase;
            letter-spacing: 1px;
            font-weight: bold;
            display: block;
            text-shadow: 1px 1px 2px black;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .ctrl-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 8px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

            .ctrl-btn:hover {
                background: rgba(255, 255, 255, 0.3);
                color: white;
                transform: scale(1.1);
            }

        /* --- VOLUME SLIDER STYLES --- */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 5px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 80%; /* Width of the slider bar */
            background: transparent;
        }

            input[type=range]:focus {
                outline: none;
            }

            /* Webkit (Chrome/Safari) Track */
            input[type=range]::-webkit-slider-runnable-track {
                width: 100%;
                height: 4px;
                cursor: pointer;
                background: rgba(255, 255, 255, 0.3);
                border-radius: 2px;
            }

            /* Webkit Thumb */
            input[type=range]::-webkit-slider-thumb {
                height: 12px;
                width: 12px;
                border-radius: 50%;
                background: #ffffff;
                cursor: pointer;
                -webkit-appearance: none;
                margin-top: -4px;
            }

            /* Firefox Track */
            input[type=range]::-moz-range-track {
                width: 100%;
                height: 4px;
                cursor: pointer;
                background: rgba(255, 255, 255, 0.3);
                border-radius: 2px;
            }

            /* Firefox Thumb */
            input[type=range]::-moz-range-thumb {
                height: 12px;
                width: 12px;
                border: none;
                border-radius: 50%;
                background: #ffffff;
                cursor: pointer;
            }
    </style>
</head>
<body>

    <video muted loop playsinline id="bg-video" poster="poster.jpg">
        <source src="thanksGary.mp4" type="video/mp4">
    </video>

    <div id="start-screen">
        <button id="start-btn" onclick="startExperience()">CLICK TO START</button>
    </div>

    <div id="player-container">
        <span id="track-title">loading...</span>

        <div class="controls-row">
            <button class="ctrl-btn" onclick="playPrev()">&#9664;</button>
            <button class="ctrl-btn" id="play-pause-btn" onclick="toggleAudio()">&#10074;&#10074;</button>
            <button class="ctrl-btn" onclick="playNext()">&#9654;</button>
        </div>

        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)">
        </div>
    </div>

    <script>
        // --- 1. PLAYLIST ---
        const playlist = [
            { file: 'gopher1.mp3', title: 'gopher no.1' },
            { file: 'quitetoo.mp3', title: 'quite too' },
            { file: 'poiy.mp3', title: 'poiy' },
            { file: 'thanksgary.mp3', title: 'thanks gary!' },
            { file: 'xavier.mp3', title: 'xavier' }
        ];

        let currentIndex = 0;
        let audioPlayer = new Audio();
        let isPlaying = false;

        // Initial Volume
        audioPlayer.volume = 0.5;

        // --- 2. ERROR CHECKING ---
        audioPlayer.addEventListener('error', function (e) {
            console.log("Audio Error:", e);
            alert("Error: Could not load audio file. Please check filenames.");
            document.getElementById('track-title').innerText = "File Not Found";
        });

        // --- 3. HELPER FUNCTIONS ---
        function loadTrack(index) {
            audioPlayer.src = playlist[index].file;
            document.getElementById('track-title').innerText = playlist[index].title;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- 4. CONTROL FUNCTIONS ---
        function playNext() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadTrack(currentIndex);
            if (isPlaying) audioPlayer.play();
        }

        function playPrev() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentIndex);
            if (isPlaying) audioPlayer.play();
        }

        function toggleAudio() {
            const btn = document.getElementById('play-pause-btn');
            if (audioPlayer.paused) {
                audioPlayer.play().then(() => {
                    isPlaying = true;
                    btn.innerHTML = "&#10074;&#10074;";
                }).catch(e => console.log("Play failed", e));
            } else {
                audioPlayer.pause();
                isPlaying = false;
                btn.innerHTML = "&#9654;";
            }
        }

        function setVolume(val) {
            audioPlayer.volume = val;
        }

        // --- 5. START FUNCTION (With 'Gary First' Logic) ---
        function startExperience() {
            // Remove Start Screen
            const screen = document.getElementById('start-screen');
            if (screen) screen.remove();

            // Show Player
            document.getElementById('player-container').style.display = 'block';

            // Play Video
            const video = document.getElementById('bg-video');
            if (video) video.play().catch(e => console.log("Video error:", e));

            try {
                // A. Shuffle everything randomly
                shuffle(playlist);

                // B. Find 'thanks gary!' and swap it to the front
                const garyIndex = playlist.findIndex(track => track.title === 'thanks gary!');
                if (garyIndex > 0) {
                    // Swap whatever is at [0] with Gary
                    [playlist[0], playlist[garyIndex]] = [playlist[garyIndex], playlist[0]];
                }

                // C. Play the first track (which is now guaranteed to be Gary)
                currentIndex = 0;
                loadTrack(currentIndex);

                audioPlayer.play().then(() => {
                    isPlaying = true;
                }).catch(e => {
                    console.log("Autoplay blocked:", e);
                    document.getElementById('play-pause-btn').innerHTML = "&#9654;";
                    isPlaying = false;
                });
            } catch (error) {
                alert("Script Error: " + error.message);
            }
        }

        audioPlayer.addEventListener('ended', playNext);
    </script>
</body>
</html>
